services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: neonq
      POSTGRES_USER: neonq
      POSTGRES_PASSWORD: neonq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neonq"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-insecure-secret-key-change-me
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_URL: postgres://neonq:neonq@db:5432/neonq
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
