# Render blueprint (M7). Deploy with: Render Dashboard → New → Blueprint.
# Secrets marked `sync: false` must be filled in the Render dashboard.

envVarGroups:
  - name: neonq-shared
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_MANIFEST_STATIC
        value: "True"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RIOT_PLATFORM
        value: jp1
      - key: RIOT_REGIONAL
        value: asia
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: RIOT_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

databases:
  - name: neonq-db
    databaseName: neonq
    user: neonq
    plan: free

services:
  - type: redis
    name: neonq-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # internal only

  - type: web
    name: neonq
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /healthz
    envVars:
      - fromGroup: neonq-shared
      - key: DJANGO_ALLOWED_HOSTS
        sync: false  # e.g. neonq.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false  # e.g. https://neonq.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: neonq-db
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: redis
          name: neonq-redis
          property: connectionString

  # F-REC-05: expire recruitments past their start time, every minute.
  - type: cron
    name: neonq-expire-recruitments
    runtime: python
    plan: free
    schedule: "* * * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py expire_recruitments"
    envVars:
      - fromGroup: neonq-shared
      - key: DATABASE_URL
        fromDatabase:
          name: neonq-db
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: redis
          name: neonq-redis
          property: connectionString

  # F-ACC-08: refresh active users' ranks daily (03:00 JST = 18:00 UTC).
  - type: cron
    name: neonq-refresh-ranks
    runtime: python
    plan: free
    schedule: "0 18 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py refresh_ranks"
    envVars:
      - fromGroup: neonq-shared
      - key: DATABASE_URL
        fromDatabase:
          name: neonq-db
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: redis
          name: neonq-redis
          property: connectionString
