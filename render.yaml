# Render blueprint (M7) — Web サービスのみ(無料枠対応)。
# DB は Supabase、Redis は Upstash(外部マネージド)を使うため Render では作らない。
# 無料枠の制約:
#   - preDeployCommand は非対応 → migrate は startCommand 内で実行。
#   - cron(type: cron)は無料枠が無い → 定期実行(expire_recruitments /
#     refresh_ranks)は GitHub Actions のスケジュールで無料代替する
#     (.github/workflows/scheduled.yml)。
# `sync: false` の値は Render ダッシュボードで設定する。
#
# Deploy: Render Dashboard → New → Blueprint。

envVarGroups:
  - name: neonq-shared
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_MANIFEST_STATIC
        value: "True"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RIOT_PLATFORM
        value: jp1
      - key: RIOT_REGIONAL
        value: asia
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: RIOT_API_KEY
        sync: false
      # Riot Sign On(RSO)。承認後に設定。未設定なら RSO 無効(手動入力にフォールバック)。
      - key: RSO_CLIENT_ID
        sync: false
      - key: RSO_CLIENT_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Supabase の Session pooler(5432)接続文字列(末尾 ?sslmode=require)。
      - key: DATABASE_URL
        sync: false
      # Upstash Redis の rediss:// URL。
      - key: CACHE_URL
        sync: false

services:
  - type: web
    name: neonq
    runtime: python
    plan: free  # ローンチ時はスリープ回避のため starter 以上を推奨
    region: singapore  # JP に近いリージョン
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    # free tier は preDeploy 非対応のため、起動時に migrate を実行してから gunicorn。
    startCommand: "python manage.py migrate --noinput && gunicorn config.wsgi:application"
    healthCheckPath: /healthz
    envVars:
      - fromGroup: neonq-shared
      - key: DJANGO_ALLOWED_HOSTS
        sync: false  # neonq.online,www.neonq.online,.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false  # https://neonq.online,https://www.neonq.online,https://*.onrender.com
      - key: DJANGO_PREPEND_WWW
        value: "False"  # True で apex→www に 301(www を正規化したい場合)
