# Render blueprint (M7) — app + cron only.
# DB は Supabase、Redis は Upstash(いずれも外部マネージド)を使うため、
# Render 側では PostgreSQL / Redis サービスは作らない。
# `sync: false` の値は Render ダッシュボードで設定する。
#
# Deploy: Render Dashboard → New → Blueprint。

envVarGroups:
  - name: neonq-shared
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_MANIFEST_STATIC
        value: "True"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RIOT_PLATFORM
        value: jp1
      - key: RIOT_REGIONAL
        value: asia
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: RIOT_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      # Supabase の接続文字列。アプリは session プーラー(5432)を推奨。
      - key: DATABASE_URL
        sync: false
      # Upstash Redis の rediss:// URL。
      - key: CACHE_URL
        sync: false

services:
  - type: web
    name: neonq
    runtime: python
    plan: free  # ローンチ時はスリープ回避のため starter 以上を推奨
    region: singapore  # JP に近いリージョン
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /healthz
    envVars:
      - fromGroup: neonq-shared
      - key: DJANGO_ALLOWED_HOSTS
        sync: false  # neonq.online,www.neonq.online,<app>.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false  # https://neonq.online,https://www.neonq.online
      - key: DJANGO_PREPEND_WWW
        value: "False"  # True で apex→www に 301(www を正規化したい場合)

  # F-REC-05: expire recruitments past their start time, every minute.
  - type: cron
    name: neonq-expire-recruitments
    runtime: python
    plan: free
    region: singapore
    schedule: "* * * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py expire_recruitments"
    envVars:
      - fromGroup: neonq-shared

  # F-ACC-08: refresh active users' ranks daily (03:00 JST = 18:00 UTC).
  - type: cron
    name: neonq-refresh-ranks
    runtime: python
    plan: free
    region: singapore
    schedule: "0 18 * * *"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py refresh_ranks"
    envVars:
      - fromGroup: neonq-shared
