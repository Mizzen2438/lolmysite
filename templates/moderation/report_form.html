{% extends "base.html" %}

{% block title %}通報 — NEONQ{% endblock %}

{% block content %}
<div class="panel" style="max-width:560px; margin:32px auto;">
  <h2>通報する</h2>
  <p style="color:var(--text-dim); font-size:0.9rem;">対象: {{ label }}</p>
  <form method="post" class="form-grid">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-row">
        <label>{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}<span class="hint" style="color:var(--danger);">{{ error }}</span>{% endfor %}
      </div>
    {% endfor %}
    <button class="btn btn-danger btn-block" type="submit">通報する</button>
  </form>
</div>
{% endblock %}
